<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="100%" height="100%">
  <defs>
    <style>
      .canvas-bg { fill: #0F172A; stroke: #334155; stroke-width: 2; stroke-dasharray: 4 4; }
      .block-header { fill: #020617; }
      .block-nav { fill: #1E293B; rx: 3px; }
      .block-hero { fill: #1E293B; stroke: #334155; }
      .block-main { fill: #020617; stroke: #334155; }
      .card-item { fill: #1E293B; stroke: #334155; stroke-width: 1.5; }
      .btn-accent { fill: #E11D48; rx: 3px; }
      
      /* Typography Classes */
      .font-title { font-family: system-ui, -apple-system, sans-serif; font-size: 16px; font-weight: bold; fill: #F8FAFC; }
      .font-header-text { font-family: system-ui, -apple-system, sans-serif; font-size: 18px; font-weight: bold; fill: #F8FAFC; }
      .font-nav-text { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; fill: #94A3B8; }
      .font-bold-label { font-family: system-ui, -apple-system, sans-serif; font-size: 12px; font-weight: 700; fill: #E11D48; }
      .font-body-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #94A3B8; }
      .font-btn-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; font-weight: bold; fill: #FFFFFF; }
      .font-footer-text { font-family: system-ui, -apple-system, sans-serif; font-size: 11px; fill: #64748B; }
    </style>
  </defs>

  <rect x="0" y="0" width="800" height="620" class="canvas-bg" />
  
  <text x="400" y="25" class="font-title" text-anchor="middle">Desktop Architecture Framework Matrix</text>

  <rect x="20" y="45" width="760" height="65" class="block-header" rx="4" stroke="#E11D48" />
  <text x="40" y="84" class="font-header-text" text-anchor="start">🍿 MovieScoop Hub</text>
  
  <rect x="410" y="60" width="350" height="35" class="block-nav" />
  <text x="585" y="82" class="font-nav-text" text-anchor="middle" letter-spacing="0.5">Home  |  Recommendations  |  Genres &amp; Watchlist</text>

  <rect x="20" y="125" width="760" height="110" class="block-hero" rx="4" />
  <text x="400" y="170" class="font-title" text-anchor="middle" font-size="18">Stop Searching. Start Watching.</text>
  <text x="400" y="192" class="font-body-text" text-anchor="middle" font-size="13">Asynchronously loading 15 custom entertainment suggestions tailored right to your taste profiles</text>

  <rect x="20" y="250" width="760" height="290" class="block-main" rx="4" />
  <text x="40" y="278" class="font-title">Dynamic Collection Feed Matrix (Minimum of 15 JSON items loaded via Async Fetch API)</text>

  <g transform="translate(40, 295)">
    <rect x="0" y="0" width="225" height="155" class="card-item" rx="6" />
    <text x="15" y="28" class="font-bold-label">1. Interstellar (Title)</text>
    <text x="15" y="48" class="font-body-text">Genre: Sci-Fi / Space</text>
    <text x="15" y="66" class="font-body-text">Category: Movie | 2014</text>
    <text x="15" y="84" class="font-body-text">Rating: ⭐ 8.6 / 10</text>
    <rect x="15" y="110" width="100" height="26" class="btn-accent" />
    <text x="65" y="126" class="font-btn-text" text-anchor="middle">View Details</text>
  </g>

  <g transform="translate(287, 295)">
    <rect x="0" y="0" width="225" height="155" class="card-item" rx="6" />
    <text x="15" y="28" class="font-bold-label">2. Breaking Bad (Title)</text>
    <text x="15" y="48" class="font-body-text">Genre: Crime / Drama</text>
    <text x="15" y="66" class="font-body-text">Category: TV Show | 2008</text>
    <text x="15" y="84" class="font-body-text">Rating: ⭐ 9.5 / 10</text>
    <rect x="15" y="110" width="100" height="26" class="btn-accent" />
    <text x="65" y="126" class="font-btn-text" text-anchor="middle">View Details</text>
  </g>

  <g transform="translate(535, 295)">
    <rect x="0" y="0" width="225" height="155" class="card-item" rx="6" />
    <text x="15" y="28" class="font-bold-label">3. Severance (Title)</text>
    <text x="15" y="48" class="font-body-text">Genre: Thriller / Mystery</text>
    <text x="15" y="66" class="font-body-text">Category: TV Show | 2022</text>
    <text x="15" y="84" class="font-body-text">Rating: ⭐ 8.7 / 10</text>
    <rect x="15" y="110" width="100" height="26" class="btn-accent" />
    <text x="65" y="126" class="font-btn-text" text-anchor="middle">View Details</text>
  </g>

  <rect x="40" y="470" width="720" height="50" class="card-item" stroke-dasharray="3 3" rx="4"/>
  <text x="400" y="500" class="font-title" font-size="12" text-anchor="middle">Interactive Form Filters Module — Genre Dropdowns, Ratings Slider &amp; Feedback Storage</text>

  <rect x="20" y="555" width="760" height="45" fill="#020617" rx="4" />
  <text x="40" y="582" class="font-footer-text" text-anchor="start">© 2026 Ignatia Praise Mbachu | Lagos, Nigeria</text>
  <text x="760" y="582" class="font-footer-text" text-anchor="end">Resource Attributions Document</text>
</svg>
