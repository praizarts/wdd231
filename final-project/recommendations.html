<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="MovieScoop helps you discover highly-rated movies and TV shows with personalized recommendations, filtering tools, and a saved watchlist.">
    <meta name="author" content="Ignatia Praise Mbachu">
    <title>MovieScoop | Home</title>

    <!-- Favicon -->
    <link rel="icon" href="images/favicon.ico" type="image/x-icon">

    <!-- Facebook / Open Graph Meta Tags -->
    <meta property="og:title" content="MovieScoop | Homepage">
        <meta property="og:description"
        content="Discover highly-rated movies and TV shows with personalized recommendations, filtering tools, and a saved watchlist.">
        <meta property="og:image"
        content="https://praizarts.github.io/wdd231/final-project/images/logo.png">
        <meta property="og:url"
        content="https://praizarts.github.io/wdd231/final-project/index.html">
        <meta property="og:type" content="website">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="styles/small.css">
    <link rel="stylesheet" href="styles/large.css">

    <!-- Scripts -->
    <script type="module" src="scripts/recommendations.js"></script>
</head>
<body>
<!-- HEADER -->
   <header>
    <div class="header-container">
        <a href="index.html" class="logo">
            <img src="images/logo.png" alt="MovieScoop Logo">
            <span>MovieScoop</span>
        </a>

        <button type="button" id="menu-btn" class="menu-btn" aria-label="Toggle Navigation">
            ☰
        </button>

        <nav id="primary-nav">
            <ul class="navigation">
                <li><a href="index.html">Home</a></li>
                <li><a href="recommendations.html" class="active">Recommendations</a></li>
                <li><a href="watchlist.html">Watchlist</a></li>
            </ul>
        </nav>
    </div>
</header>

  <main>
<section>
    <h1>Recommendations</h1>

    <div class="filters">

        <select id="genre-filter" aria-label="Genre filter">
            <option value="all">All Genres</option>
        </select>

        <select id="category-filter" aria-label="Category filter">
            <option value="all">Movies & TV Shows</option>
            <option value="Movie">Movies</option>
            <option value="TV Show">TV Shows</option>
        </select>

    </div>

    <div id="movie-grid" class="movie-grid"></div>

</section>

</main>

<dialog id="movie-modal">
    <div class="modal-content">
        <h2 id="modal-title"></h2>
        <p id="modal-meta"></p>
        <p id="modal-description"></p>

        <button type="button" id="add-watchlist" class="details-btn">
            Add to Watchlist
        </button>

        <button type="button" id="close-modal" class="close-btn">
            Close
        </button>
    </div>
</dialog>

<!-- FOOTER -->
<footer>
    <p>WDD231 Final Project</p>
    <p>Ignatia Praise Mbachu | Lagos, Nigeria</p>
    <p>&copy; <span id="current-year"></span> MovieScoop</p>
    <p>Last Modification: <span id="last-modified"></span></p>
    <p><a href="attributions.html">Resource Attributions</a></p>
</footer>

</body>
</html>
